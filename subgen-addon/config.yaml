name: "SubGen - Whisper Subtitles voor Bazarr"
description: "Genereert automatisch ondertitels met OpenAI Whisper via de ASR API. Werkt als subtitle provider in Bazarr."
version: "1.0.2"
slug: "subgen"
init: false
arch:
  - amd64
  - aarch64

ports:
  9000/tcp: 9000
ports_description:
  9000/tcp: "ASR webservice poort (gebruik dit in Bazarr)"

environment:
  WHISPER_MODEL: "small"
  TRANSCRIBE_DEVICE: "cpu"
  CONCURRENT_TRANSCRIPTIONS: "1"
  WHISPER_THREADS: "4"
  TRANSCRIBE_OR_TRANSLATE: "transcribe"
  WEBHOOKPORT: "9000"
  PROCADDEDMEDIA: "false"
  PROCMEDIAONPLAY: "false"
  USE_PATH_MAPPING: "false"
  MODEL_PATH: "/share/subgen/models"
  DEBUG: "false"
