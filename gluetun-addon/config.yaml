name: "Gluetun VPN"
version: "1.0.3"
slug: "gluetun-addon"
description: "VPN client for multiple providers with proxy services"
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
startup: application
init: false
ports:
  8388/tcp: 8388
  8388/udp: 8388
devices:
  - /dev/net/tun
map:
  - config:rw
  - data:rw
panel_icon: mdi:vpn
hassio_api: true
hassio_role: default
privileged:
  - NET_ADMIN
options:
  vpn_provider: ""
  vpn_type: "openvpn"
  openvpn_user: ""
  openvpn_password: ""
  wireguard_private_key: ""
  wireguard_addresses: ""
  shadowsocks_enabled: false
  shadowsocks_port: 8388
  shadowsocks_password: ""
  shadowsocks_method: "aes-256-gcm"
  http_proxy_enabled: false
  http_proxy_port: 8888
  dns_providers: ""
  tz: ""
schema:
  vpn_provider: str
  vpn_type: list(openvpn|wireguard)
  openvpn_user: str?
  openvpn_password: str?
  wireguard_private_key: str?
  wireguard_addresses: str?
  shadowsocks_enabled: bool
  shadowsocks_port: int(1024,65535)
  shadowsocks_password: str?
  shadowsocks_method: list(aes-256-gcm|aes-128-gcm|chacha20-poly1305|aes-256-cfb|aes-128-cfb)
  http_proxy_enabled: bool
  http_proxy_port: int(1024,65535)
  dns_providers: str?
  tz: str?
